<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>BlackBox – Smart Security Packet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="css/style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">BlackBox</a>
      <div class="dropdown">
        <button class="dropdown-btn">Login</button>
        <div class="dropdown-content">
          <a href="admin.html">Admin Login</a>
          <a href="ecommerce_login.html">Partner Login</a>
        </div>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container hero-inner">

      <div>
        <p class="eyebrow">Lock it • Track it • Own it</p>
        <h1>Revolutionizing<br>Package Security<br>with IoT</h1>
        <p class="hero-sub">
          Secure high-value deliveries using OTP-authenticated IoT locks.
        </p>
      </div>

      <div class="hero-media">
        <div class="hero-card">
          <h3 id="card-title">Enter Packet ID</h3>

          <label class="small">Packet ID</label>
          <input id="packetId" class="input-field" />

          <div id="status" class="status"></div>

          <div id="action">
            <button class="btn btn-primary btn-full" id="requestOtp" type="button">
              Generate OTP
            </button>

          </div>

          <p class="small" id="note">
            Enter the Packet ID printed on your BlackBox.
          </p>
        </div>
      </div>

    </div>
  </section>

  <section class="partners">
    <div class="container" style="padding: 2rem 0;">

      <div class="partner-access">
        <h3>Partner Access</h3>
        <p>
          Logistics and retail portal.
        </p>
        <button class="admin partner-login-btn" onclick="window.location.href='ecommerce_login.html'">
          Login
        </button>
      </div>

    </div>
  </section>

  <script src="js/navigation.js"></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
